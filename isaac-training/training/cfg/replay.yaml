defaults:
  - _self_
  - drone
  - sim

headless: true
device: "cuda:0"

viewer:
  eye: [0.0, 28.0, 28.0]
  lookat: [0.0, 2.5, 1.5]
  resolution: [1920, 1080]

wandb:
  project: NavRL
  name: scenario_replay
  entity: anthonyshen730-carnegie-mellon-university
  mode: online
  run_id:

replay:
  # Replace with your scenario_data.json path.
  json: /abs/path/to/scenario_data.json
  headless: true
  speed: 1.0
  loop: false
  anti_aliasing: 4
  drone_model: Hummingbird
  sim_dt: 0.01
  ground_size: 120.0
  record: true
  record_every: 1
  video_tag: recording
  video_output:
  save_stage:
  wandb: true
